services:
  - type: web
    runtime: node
    name: block-chain-technology-api
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - server/**
        - render.yaml
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URLS
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CODE_EXPIRY_HOURS
        value: "168"
      - key: UPLOAD_DIR
        value: ../uploads
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1

  - type: web
    runtime: static
    name: block-chain-technology-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - client/**
        - render.yaml
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
